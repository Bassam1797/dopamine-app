<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>FocusTasks PWA</title>
<meta name="description" content="Offline-first focus planner with Today timers, Upcoming tasks, planner blocks, notes, heatmap, backups, and WebDAV sync.">
<meta name="theme-color" content="#4cafef">
<meta name="background-color" content="#f5f5f5">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css" />
<link rel="icon" href="icons/icon-192.png" type="image/png">
</head>
<body>
<header>
  <div class="brand">
    <img src="icons/focustasks-logo.svg" alt="FocusTasks" class="brand-logo" />
  </div>
  <button id="darkToggle" title="Toggle Dark Mode">🌙</button>
</header>

<main>
  <section id="stats">
    <div>Streak: <span id="streak">0</span></div>
    <div>Points: <span id="points">0</span></div>
    <div>
      Day Score: <span id="score">0%</span>
      <div class="progress"><div id="barToday" class="fill"></div></div>
    </div>
    <div>
      Week Progress: <span id="weekProg">0%</span>
      <div class="progress"><div id="barWeek" class="fill"></div></div>
    </div>
    <div id="heatmap" class="heatmap"></div>
  </section>

  <section id="controls">
    <label for="weekSel">Week:</label><select id="weekSel"></select>
    <label for="dateSel">Date:</label><input type="date" id="dateSel" />
    <button id="notifyBtn">Enable Notifications</button>
  </section>

  <section id="tasks">
    <h2>Today</h2>
    <div class="mut">Actionable tasks for today, each with its own timer and pre-alerts.</div>
    <div id="tasksList"></div>
    <button id="addTaskBtn">+ Add Task</button>
  </section>

  <section id="scheduled">
    <h2>Upcoming</h2>
    <form id="schedForm" autocomplete="off">
      <input type="text" id="schedText" placeholder="Task title" />
      <input type="date" id="schedDate" />
      <input type="time" id="schedTime" />
      <input type="number" id="schedMin" min="1" value="25" title="Minutes" />
      <select id="schedRepeat" title="Repeat">
        <option value="none">No repeat</option><option value="daily">Daily</option>
        <option value="weekdays">Weekdays</option><option value="weekly">Weekly</option>
        <option value="monthly">Monthly</option><option value="every3">Every 3 days</option>
      </select>
      <label class="checkbox-inline"><input type="checkbox" id="schedAutoStart" checked /> Autostart</label>
      <button type="submit">Add</button>
    </form>
    <div>
      <button id="exportIcsBtn">Export to Calendar (.ics)</button>
    </div>
    <div id="scheduledList"></div>
  </section>

  <section id="planner">
    <h2>Planner</h2>
    <div id="plannerGrid" class="planner-grid"></div>
  </section>

  <section id="notesSec">
    <h2>Notes</h2>
    <div class="notes-top">
      <input id="noteFolder" placeholder="Folder" />
      <input id="noteTitle" placeholder="Note title" />
      <button id="newNoteBtn">New Note</button>
      <button id="toggleSprintBtn">Writing Sprint</button>
    </div>
    <div class="notes-wrap">
      <div id="notesList"></div>
      <textarea id="noteBody" rows="8" placeholder="Type / for quick commands"></textarea>
    </div>
  </section>

  <section>
    <h2>Break & Play</h2>
    <button class="breakBtn" data-min="2">2m break</button>
    <button class="breakBtn" data-min="3">3m break</button>
    <button class="breakBtn" data-min="5">5m break</button>
    <div id="timerDisplay"></div>
  </section>

  <section>
    <h2>Data & Sync</h2>
    <button onclick="exportJSON()">Export JSON</button>
    <button onclick="exportCSV()">Export CSV</button>
    <button id="exportEncryptedBtn">Export Encrypted Backup (.ftb)</button>
    <input type="file" id="importFile" accept=".json,.ftb" />
    <div class="sync-grid">
      <input id="davUrl" placeholder="WebDAV URL" />
      <input id="davUser" placeholder="Username" />
      <input id="davPass" placeholder="Password" type="password" />
      <button id="davTestBtn">Test</button>
      <button id="davSyncBtn">Sync Now</button>
    </div>
  </section>

  <section id="settings">
    <h2>Settings</h2>
    <label class="toggle"><input type="checkbox" id="autostartChainToggle" /> Autostart & chain</label>
    <label class="toggle"><input type="checkbox" id="quickCaptureToggle" /> Quick Capture</label>
    <label class="toggle"><input type="checkbox" id="zenToggle" /> Zen Mode</label>
    <label class="toggle"><input type="checkbox" id="heatmapToggle" checked /> Weekly Heatmap</label>
    <label class="toggle"><input type="checkbox" id="hapticsToggle" /> Haptics</label>
    <label class="toggle"><input type="checkbox" id="loopToggle" /> Loop weeks after Week 4</label>
    <button id="resetStartBtn">Reset start date to Today</button>
    <div><strong>Start date:</strong> <span id="startDateLabel">—</span></div>
  </section>
</main>

<button id="quickCaptureBtn" title="Quick Capture">＋</button>
<footer><small>Offline-first PWA • Local-first by default</small></footer>
<script src="app.js" defer></script>
<script>if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(console.error);</script>
</body>
</html>
